apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: pyspark-on-k8s
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "spark-k8s-app:2.0"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///app/spark_on_k8s_app.py
  sparkVersion: "3.5.3"
  # Automatically delete the SparkApplication and all its resources after 300 seconds (5 minutes)
  timeToLiveSeconds: 300
  sparkConf:
    # Automatically delete driver pod on termination
    "spark.kubernetes.driver.deleteOnTermination": "true"
    # Automatically delete executor pods on termination  
    "spark.kubernetes.executor.deleteOnTermination": "true"
    # Clean up completed pods after 60 seconds (optional)
    "spark.kubernetes.executor.podNamePrefix": "pyspark-on-k8s"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 10
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "512m"
    labels:
      version: 3.5.3
    serviceAccount: spark
  executor:
    cores: 1
    instances: 2
    memory: "1500m"
    labels:
      version: 3.5.3
